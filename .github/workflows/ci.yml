name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend & Analysis Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/backend/ tests/analysis/ -v -p no:django

  test-frontend:
    name: Frontend (Django) Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: environment/frontend_server/requirements.txt

      - name: Install dependencies
        run: pip install -r environment/frontend_server/requirements.txt

      - name: Run tests
        run: python -m pytest tests/frontend/ -v
        env:
          DJANGO_SETTINGS_MODULE: frontend_server.settings.base
          PYTHONPATH: reverie/backend_server:environment/frontend_server:analysis

  test-react-frontend:
    name: React Frontend (Phase 1)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environment/react_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: environment/react_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: environment/react_frontend/playwright-report/
          retention-days: 7
